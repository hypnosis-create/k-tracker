<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立ノート v1.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --surface2: #f3f0e8;
    --ink: #2c2416;
    --ink2: #7a6e5c;
    --ink3: #b5a98e;
    --accent: #c4622d;
    --accent2: #e8a87c;
    --green: #4a7c59;
    --green-bg: #eef5f0;
    --amber: #c4862d;
    --amber-bg: #fdf3e3;
    --border: #e8e0d0;
    --shadow: 0 2px 16px rgba(44,36,22,0.07);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
  }
  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.03em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo .recipe-manager { display: none; }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
    flex-shrink: 0;
  }
  .tab-btn {
    padding: 6px 10px;
    border: none;
    background: none;
    border-radius: 7px;
    font-size: 12px;
    font-family: 'Noto Sans JP';
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--ink);
    font-weight: 500;
    box-shadow: 0 1px 4px rgba(44,36,22,0.1);
  }

  /* Layout */
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .page { display: none; }
  .page.active { display: block; }

  /* Search & filters */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    gap: 8px;
  }
  .search-box input {
    border: none;
    outline: none;
    width: 100%;
    padding: 10px 0;
    font-family: 'Noto Sans JP';
    font-size: 14px;
    background: none;
    color: var(--ink);
  }
  .search-box input::placeholder { color: var(--ink3); }
  .filter-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    font-family: 'Noto Sans JP';
    font-size: 12px;
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn.on {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .filter-btn:hover:not(.on) { border-color: var(--ink3); }

  /* Recipe grid */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .recipe-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
    border-color: var(--accent2);
  }
  .recipe-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .recipe-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 400;
  }
  .badge-healsio { background: var(--amber-bg); color: var(--amber); }
  .badge-fav { background: #fff0eb; color: var(--accent); }
  .badge-good { background: var(--green-bg); color: var(--green); }
  .recipe-count {
    font-size: 12px;
    color: var(--ink3);
    margin-bottom: 16px;
  }

  /* Recipe detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    max-width: 540px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 8px 48px rgba(44,36,22,0.2);
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink2);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    padding-right: 40px;
    color: var(--ink);
  }
  .ingredient-list {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .ingredient-list h4 {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ingredient-item {
    font-size: 14px;
    color: var(--ink);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .ingredient-item:last-child { border-bottom: none; }
  .ingredient-item .qty { color: var(--ink2); font-size: 13px; }

  /* Calendar */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    min-height: 90px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-cell:hover { border-color: var(--accent2); }
  .day-cell.today { border-color: var(--accent); background: #fff8f5; }
  .day-label {
    font-size: 11px;
    color: var(--ink3);
    font-weight: 500;
    margin-bottom: 2px;
  }
  .day-date {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .day-menu {
    font-size: 11px;
    color: var(--accent);
    line-height: 1.4;
    font-weight: 500;
  }
  .day-cell.today .day-date { color: var(--accent); }

  /* Shopping list */
  .shopping-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .shopping-header {
    padding: 14px 18px;
    background: var(--surface2);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink2);
    letter-spacing: 0.05em;
  }
  .shopping-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .shopping-item:last-child { border-bottom: none; }
  .shopping-item.checked { background: var(--surface2); }
  .shopping-item.checked .item-name { text-decoration: line-through; color: var(--ink3); }
  .shopping-item input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--green);
    cursor: pointer;
    flex-shrink: 0;
  }
  .item-name { font-size: 14px; color: var(--ink); flex: 1; }
  .item-qty { font-size: 13px; color: var(--ink2); }

  /* Setup screen */
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 500px;
    margin: 40px auto;
  }
  .setup-card h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .setup-card p { font-size: 13px; color: var(--ink2); margin-bottom: 24px; line-height: 1.7; }
  .setup-card textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'Noto Sans JP';
    font-size: 12px;
    color: var(--ink);
    resize: vertical;
    height: 120px;
    background: var(--bg);
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'Noto Sans JP';
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-top: 16px;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }

  .status-msg {
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 12px;
  }
  .status-msg.ok { background: var(--green-bg); color: var(--green); }
  .status-msg.err { background: #fef0f0; color: #c0392b; }
  .status-msg.info { background: var(--amber-bg); color: var(--amber); }

  .empty { text-align: center; padding: 48px 24px; color: var(--ink3); font-size: 14px; }
  .empty .icon { font-size: 32px; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .recipe-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ===== VERTICAL CALENDAR (mobile) ===== */
  .day-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .day-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 56px;
  }
  .day-row:active { background: var(--surface2); }
  .day-row.today { border-color: var(--accent); background: #fff8f5; }
  .day-row-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 36px;
  }
  .day-row-label { font-size: 11px; color: var(--ink3); font-weight: 500; }
  .day-row-date { font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1; }
  .day-row.today .day-row-date { color: var(--accent); }
  .day-row-menu { font-size: 14px; color: var(--ink); flex: 1; }
  .day-row-empty { font-size: 13px; color: var(--ink3); flex: 1; }
  .day-row-add { font-size: 20px; color: var(--ink3); }

  /* ===== BOTTOM SHEET MODAL ===== */
  .sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.45);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    width: 100%;
    max-width: 600px;
    box-shadow: 0 -4px 32px rgba(44,36,22,0.15);
    animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
  }
  .sheet-close {
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink2);
    display: flex; align-items: center; justify-content: center;
  }
  .sheet-body { padding: 20px; }
  .sheet-field { margin-bottom: 16px; }
  .sheet-field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sheet-field input[type=date],
  .sheet-field input[type=text] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Noto Sans JP';
    font-size: 15px;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .sheet-field input:focus { border-color: var(--accent); }
  .sheet-actions {
    display: flex;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .btn-sheet-save {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Noto Sans JP';
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-sheet-cancel {
    background: var(--surface2);
    color: var(--ink2);
    border: none;
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'Noto Sans JP';
    font-size: 15px;
    cursor: pointer;
  }
  .btn-sheet-delete {
    background: #fef0f0;
    color: #c0392b;
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Noto Sans JP';
    font-size: 15px;
    cursor: pointer;
  }

  /* ===== DELETE BUTTON IN RECIPE MODAL ===== */
  .btn-delete-recipe {
    margin-top: 10px;
    background: #fef0f0;
    color: #c0392b;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans JP';
    width: 100%;
  }
  .btn-delete-recipe:active { opacity: 0.7; }


  /* ===== URL BADGE ON CARD ===== */
  .badge-url {
    background: #e8f0fe;
    color: #1a73e8;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 400;
  }
  .recipe-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  /* URL入力欄 in modal */
  .url-input-row {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .url-input-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Noto Sans JP';
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    outline: none;
  }
  .url-input-row input:focus { border-color: var(--accent); }
  .btn-url-save {
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans JP';
  }
  /* ===== WEEK SECTION ===== */
  .week-section { margin-bottom: 20px; }
  .week-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 4px 8px;
  }

  /* ===== VERSION BADGE ===== */
  .version-badge {
    font-size: 10px;
    color: var(--ink3);
    background: var(--surface2);
    border-radius: 4px;
    padding: 2px 6px;
    margin-left: 6px;
    font-family: 'Noto Sans JP';
    font-weight: 400;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div class="logo">献立ノート <span class="version-badge">v1.3</span><span class="recipe-manager"> Recipe Manager</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showPage('recipes')">レシピ</button>
    <button class="tab-btn" onclick="showPage('calendar')">カレンダー</button>
    <button class="tab-btn" onclick="showPage('shopping')">買い物</button>
    <button class="tab-btn" onclick="showPage('setup')">設定</button>
  </div>
</header>

<!-- RECIPES PAGE -->
<div id="page-recipes" class="page active">
  <div class="container">
    <div class="toolbar">
      <div class="search-box">
        <span style="color:var(--ink3)">🔍</span>
        <input type="text" id="search-input" placeholder="レシピを検索..." oninput="filterRecipes()">
      </div>
      <button class="filter-btn" id="f-healsio" onclick="toggleFilter('healsio')">🔥 ヘルシオ</button>
      <button class="filter-btn" id="f-fav" onclick="toggleFilter('fav')">⭐ お気に入り◎</button>
    </div>
    <div id="recipe-count" class="recipe-count"></div>
    <div id="recipe-grid" class="recipe-grid">
      <div class="empty"><div class="icon">🍳</div>設定タブからデータを読み込んでください</div>
    </div>
  </div>
</div>

<!-- CALENDAR PAGE -->
<div id="page-calendar" class="page">
  <div class="container">
    <div id="week-grid" class="day-list"></div>
  </div>
</div>

<!-- SHOPPING PAGE -->
<div id="page-shopping" class="page">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-family:'Noto Serif JP';font-size:18px">今週の買い物リスト</h2>
      <button onclick="generateShoppingList()" class="btn-primary" style="width:auto;margin:0;padding:8px 18px;font-size:13px">🔄 献立から生成</button>
    </div>
    <div id="shopping-content">
      <div class="empty"><div class="icon">🛒</div>「献立から生成」ボタンで今週分の食材リストを作成</div>
    </div>
  </div>
</div>

<!-- SETUP PAGE -->
<div id="page-setup" class="page">
  <div class="container">
    <div class="setup-card">
      <h2>データベース設定</h2>
      <p>Supabaseにレシピデータのテーブルを作成し、Excelのデータを移行します。<br>初回のみ必要な作業です。</p>
      <div id="setup-status"></div>
      <button class="btn-primary" onclick="initDB()" id="init-btn">① テーブルを作成する</button>
      <button class="btn-primary" onclick="importData()" id="import-btn" style="margin-top:8px;background:var(--green)">② サンプルデータを取り込む</button>
      <button class="btn-primary" onclick="checkData()" style="margin-top:8px;background:var(--ink2)">③ データ確認</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Bottom Sheet: 献立編集 -->
<div class="sheet-overlay" id="meal-sheet" onclick="closeMealSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title">献立を登録</div>
      <button class="sheet-close" onclick="document.getElementById('meal-sheet').classList.remove('open')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="sheet-field">
        <label>日付</label>
        <input type="date" id="sheet-date">
      </div>
      <div class="sheet-field">
        <label>メニュー</label>
        <input type="text" id="sheet-menu" placeholder="例: 豚の角煮">
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-sheet-cancel" onclick="document.getElementById('meal-sheet').classList.remove('open')">キャンセル</button>
      <button class="btn-sheet-delete" id="sheet-delete-btn" onclick="deleteMealPlan()" style="display:none">削除</button>
      <button class="btn-sheet-save" onclick="saveMealFromSheet()">保存</button>
    </div>
  </div>
</div>

async function loadRecipes() {
  const { data, error } = await sb.from('recipes').select('*, ingredients(*)').order('name');

  allRecipes = data || [];
  filterRecipes();
}

function filterRecipes() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = allRecipes.filter(r => r.name.toLowerCase().includes(q));
  if (filters.healsio) list = list.filter(r => r.is_healsio);
  if (filters.fav) list = list.filter(r => r.rating === '◎');
  renderRecipes(list);
}

function toggleFilter(key) {
  filters[key] = !filters[key];
  document.getElementById('f-' + key).classList.toggle('on', filters[key]);
  filterRecipes();
}

function renderRecipes(list) {
  const grid = document.getElementById('recipe-grid');
  document.getElementById('recipe-count').textContent = `${list.length} 品`;
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">🔍</div>該当するレシピがありません</div>';
    return;
  }
  grid.innerHTML = list.map(r => {
    const hasUrl = r.url && r.url.trim();
    return `<div class="recipe-card" onclick="showRecipe(${r.id})">
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-badges">
        ${r.rating === '◎' ? '<span class="badge badge-fav">⭐ お気に入り</span>' : ''}

async function saveRecipeUrl(id) {
  const url = document.getElementById('modal-url-input').value.trim();

  if (r) r.url = url;
  document.getElementById('modal').classList.remove('open');
  filterRecipes();
}


async function deleteRecipe(id, name) {

  if (error) { alert('削除に失敗しました: ' + error.message); return; }

  await loadRecipes();
}

// ========= CALENDAR =========
const DAYS = ['日','月','火','水','木','金','土'];

function getWeekDates(offset) {
  const today = new Date();
  const mon = new Date(today);
  mon.setDate(today.getDate() - today.getDay() + 1 + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function fmtDate(d) {
  return d.toISOString().slice(0,10);
}

async function loadMealPlans(dates) {
  const from = fmtDate(dates[0]);
  const to = fmtDate(dates[6]);
  const { data } = await sb.from('meal_plans').select('*').gte('date', from).lte('date', to);
  mealPlans = {};
  (data || []).forEach(m => { mealPlans[m.date] = m.menu; });
}

async function renderCalendar() {
  // 今週含む過去4週分（28日）の日付を生成
  const today = new Date();
  // 今週の月曜を起点に
  const thisMon = new Date(today);
  thisMon.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  // 4週分（28日）の全日付
  const allDates = Array.from({length: 28}, (_, i) => {
    const d = new Date(thisMon);
    d.setDate(thisMon.getDate() - 21 + i); // 3週前の月曜〜今週の日曜
    return d;
  });
  // DBから4週分まとめて取得
  const fromDate = fmtDate(allDates[0]);
  const toDate = fmtDate(allDates[27]);
  const { data } = await sb.from('meal_plans').select('*').gte('date', fromDate).lte('date', toDate);
  mealPlans = {};
  (data || []).forEach(m => { mealPlans[m.date] = m.menu; });

  const todayStr = fmtDate(today);
  const grid = document.getElementById('week-grid');

  // 週ごとにグループ化して逆順（新しい週が上）
  const weeks = [];
  for (let w = 3; w >= 0; w--) {
    weeks.push(allDates.slice(w * 7, w * 7 + 7));
  }

  grid.innerHTML = weeks.map((week, wi) => {
    const d0 = week[0], d6 = week[6];
    const label = wi === 0 ? '今週' : `${d0.getMonth()+1}/${d0.getDate()}〜${d6.getMonth()+1}/${d6.getDate()}`;
    const rows = week.map(d => {
      const ds = fmtDate(d);
      const isToday = ds === todayStr;
      const menu = mealPlans[ds] || '';
      return `<div class="day-row ${isToday?'today':''}" onclick="editDay('${ds}')">
        <div class="day-row-left">
          <div class="day-row-label">${DAYS[d.getDay()]}</div>
          <div class="day-row-date">${d.getDate()}</div>
        </div>
        ${menu
          ? `<div class="day-row-menu">${menu}</div>`
          : `<div class="day-row-empty">タップして登録</div>`}
        <div class="day-row-add">${menu ? '✏️' : '＋'}</div>
      </div>`;
    }).join('');
    return `<div class="week-section">
      <div class="week-section-label">${label}</div>
      ${rows}
    </div>`;
  }).join('');
}


async function loadHistory() {
  const el = document.getElementById('history-list');
  // 過去4週分（28日）を取得
  const today = new Date();
  const past28 = new Date(today);
  past28.setDate(today.getDate() - 28);
  const fromDate = fmtDate(past28);
  const toDate = fmtDate(today);

  const { data } = await sb.from('meal_plans')
    .select('*')
    .gte('date', fromDate)
    .lte('date', toDate)
    .order('date', {ascending: false});

  if (!data || !data.length) { el.textContent = '履歴なし'; return; }
  const records = data.filter(r => r.menu && r.menu.trim());
  if (!records.length) { el.textContent = '履歴なし'; return; }

  el.innerHTML = '<table style="width:100%;border-collapse:collapse">' +
    records.map(r => `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:6px 0;width:110px;color:var(--ink3);font-size:12px">${r.date}（${DAYS[new Date(r.date + 'T00:00:00').getDay()]}）</td>
        <td style="padding:6px 8px;font-size:13px">${r.menu}</td>
      </tr>`).join('') + '</table>';
}

function editDay(dateStr) {
  openMealSheet(dateStr, mealPlans[dateStr] || '');
}

// ===== BOTTOM SHEET FUNCTIONS =====
function openMealSheet(dateStr, menuValue) {
  const today = fmtDate(new Date());
  document.getElementById('sheet-date').value = dateStr || today;
  document.getElementById('sheet-menu').value = menuValue || '';
  document.getElementById('sheet-title').textContent = dateStr && mealPlans[dateStr] ? '献立を編集' : '献立を登録';
  const deleteBtn = document.getElementById('sheet-delete-btn');
  if (dateStr && mealPlans[dateStr]) {
    deleteBtn.style.display = 'block';
    deleteBtn.dataset.date = dateStr;
  } else {
    deleteBtn.style.display = 'none';
  }
  document.getElementById('meal-sheet').classList.add('open');
  setTimeout(() => document.getElementById('sheet-menu').focus(), 300);
}

function closeMealSheet(e) {
  if (e.target === document.getElementById('meal-sheet')) {
    document.getElementById('meal-sheet').classList.remove('open');
  }
}

async function saveMealFromSheet() {
  const dateStr = document.getElementById('sheet-date').value;
  const menu = document.getElementById('sheet-menu').value.trim();
  if (!dateStr) { alert('日付を入力してください'); return; }
  await saveMealPlan(dateStr, menu);
  document.getElementById('meal-sheet').classList.remove('open');
  if (document.getElementById('page-calendar').classList.contains('active')) {
    renderCalendar();
  }
}

async function deleteMealPlan() {
  const dateStr = document.getElementById('sheet-delete-btn').dataset.date;
  if (!dateStr) return;
  await sb.from('meal_plans').delete().eq('date', dateStr);
  delete mealPlans[dateStr];
  document.getElementById('meal-sheet').classList.remove('open');
  renderCalendar();
}

async function saveMealPlan(dateStr, menu) {
  await sb.from('meal_plans').upsert({ date: dateStr, menu }, { onConflict: 'date' });
  mealPlans[dateStr] = menu;
}

function moveWeek(dir) {
  weekOffset += dir;
  renderCalendar();
}

// ========= SHOPPING =========
async function generateShoppingList() {
  const dates = getWeekDates(weekOffset);
  await loadMealPlans(dates);
  const menus = Object.values(mealPlans).filter(Boolean);
  if (!menus.length) {
    document.getElementById('shopping-content').innerHTML = '<div class="empty"><div class="icon">📅</div>今週の献立が登録されていません</div>';
    return;
  }
  // Collect ingredients for this week's menus
  const matchedRecipes = allRecipes.filter(r => menus.some(m => m.includes(r.name)));
  const items = {};
  matchedRecipes.forEach(r => {
    (r.ingredients || []).forEach(ing => {
      if (ing.type === 'ingredient') {
        const key = ing.name;
        items[key] = items[key] ? items[key] + '、' + (ing.amount || '') : (ing.amount || '適量');
      }
    });
  });

  const el = document.getElementById('shopping-content');
  if (!Object.keys(items).length) {
    el.innerHTML = `<div class="shopping-section"><div class="shopping-header">今週のメニュー</div>
      ${menus.map(m => `<div class="shopping-item"><div class="item-name">${m}</div></div>`).join('')}
    </div><div class="empty" style="padding:20px"><div class="icon">📝</div>材料データが登録されていないメニューのため、<br>食材リストを自動生成できませんでした</div>`;
    return;
  }
  el.innerHTML = `
    <div class="shopping-section">
      <div class="shopping-header">今週のメニュー：${menus.join('、')}</div>
      ${Object.entries(items).map(([name, qty]) => `
        <div class="shopping-item" id="si-${name}">
          <input type="checkbox" onchange="toggleItem('${name}')">
          <div class="item-name">${name}</div>
          <div class="item-qty">${qty}</div>
        </div>`).join('')}
    </div>`;
}

function toggleItem(name) {
  const el = document.getElementById('si-' + name);
  el.classList.toggle('checked');
}

  '鶏むね肉となすの甘酢炒め': { ingredients: ['鶏むね肉250g','なす3本'], seasonings: ['砂糖','塩','片栗粉','調理酢','みりん','醤油'] },
  '鶏肉とピーマンの甘酢炒め': { ingredients: ['鶏もも肉350g','ピーマン4個','にんじん1/3本','たまねぎ1/4個'], seasonings: [] },
  '甘酢ごまだれチキン': { ingredients: ['鶏もも肉400g'], seasonings: ['穀物酢'] },
};

async function initDB() {
  const btn = document.getElementById('init-btn');
  btn.disabled = true;
  btn.textContent = '作成中...';
  setStatus('info', 'Supabase SQLエディタで以下のSQLを実行してください：');

  const sql = `-- レシピテーブル
CREATE TABLE IF NOT EXISTS recipes (
  id SERIAL PRIMARY KEY,
  name TEXT NOT NULL,
  is_healsio BOOLEAN DEFAULT FALSE,
  rating TEXT,
  created_at TIMESTAMP DEFAULT NOW()
);

-- 材料テーブル
CREATE TABLE IF NOT EXISTS ingredients (
  id SERIAL PRIMARY KEY,
  recipe_id INTEGER REFERENCES recipes(id) ON DELETE CASCADE,
  name TEXT NOT NULL,
  amount TEXT,
  type TEXT DEFAULT 'ingredient'
);

-- 献立テーブル
CREATE TABLE IF NOT EXISTS meal_plans (
  id SERIAL PRIMARY KEY,
  date DATE UNIQUE NOT NULL,
  menu TEXT,
  created_at TIMESTAMP DEFAULT NOW()
);

-- RLS（Row Level Security）を無効化（個人利用向け）
ALTER TABLE recipes DISABLE ROW LEVEL SECURITY;
ALTER TABLE ingredients DISABLE ROW LEVEL SECURITY;
ALTER TABLE meal_plans DISABLE ROW LEVEL SECURITY;`;

  const pre = document.createElement('pre');
  pre.style.cssText = 'background:var(--surface2);border-radius:8px;padding:14px;font-size:11px;overflow:auto;margin-top:12px;line-height:1.5;color:var(--ink)';
  pre.textContent = sql;
  document.getElementById('setup-status').after(pre);
  btn.disabled = false;
  btn.textContent = '① テーブルを作成する';
}

async function importData() {
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'インポート中...';
  setStatus('info', 'データを取り込み中...');

  try {
    // Insert recipes
    const { data: inserted, error: rErr } = await sb.from('recipes').upsert(
      RECIPES_DATA.map(r => ({name: r.name, is_healsio: r.is_healsio, rating: r.rating})),
      { onConflict: 'name', ignoreDuplicates: false }
    ).select();
    if (rErr) throw rErr;

    // Insert ingredients
    const ingRows = [];
    inserted.forEach(recipe => {
      const d = INGREDIENTS_DATA[recipe.name];
      if (!d) return;
      d.ingredients.forEach(name => {
        const match = name.match(/^([^\d]+)(.*)$/);
        ingRows.push({ recipe_id: recipe.id, name: match ? match[1].trim() : name, amount: match ? match[2].trim() : '', type: 'ingredient' });
      });
      d.seasonings.forEach(name => {
        ingRows.push({ recipe_id: recipe.id, name, amount: '', type: 'seasoning' });
      });
    });
    if (ingRows.length) {
      const { error: iErr } = await sb.from('ingredients').insert(ingRows);
      if (iErr && !iErr.message.includes('duplicate')) console.warn(iErr);
    }
    setStatus('ok', `✅ ${inserted.length}品のレシピを取り込みました！レシピタブを確認してください。`);
    await loadRecipes();
  } catch (e) {
    setStatus('err', `エラー: ${e.message}（先にテーブルを作成してください）`);
  }
  btn.disabled = false;
  btn.textContent = '② サンプルデータを取り込む';
}

async function checkData() {
  const { data, error } = await sb.from('recipes').select('id', {count: 'exact'});
  if (error) {
    setStatus('err', `テーブルが見つかりません: ${error.message}`);
  } else {
    setStatus('ok', `✅ recipesテーブルに ${data.length} 件のデータがあります`);
  }
}

function setStatus(type, msg) {
  document.getElementById('setup-status').innerHTML = `<div class="status-msg ${type}">${msg}</div>`;
}

// ========= INIT =========
loadRecipes();
</script>
